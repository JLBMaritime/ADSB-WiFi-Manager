################################################################################
# /etc/NetworkManager/dnsmasq-shared.d/00-adsb-upstream.conf
#
# Drop-in for the per-AP private dnsmasq that NetworkManager spawns when a
# Wi-Fi connection has `ipv4.method=shared` (our `adsb-hotspot` profile on
# wlan1).  Two jobs:
#
#   1. PIN UPSTREAM DNS for AP clients.  Without this, dnsmasq inherits
#      `/etc/resolv.conf`, which on a Pi running both NetworkManager and
#      Tailscale flaps every 30-90 s as the two stacks rewrite DNS state.
#      A flap mid-DNS-lookup causes the iOS captive-portal probe to time
#      out and the device shows "Unable to join this network".  Pinning
#      to Cloudflare + Google decouples the AP from /etc/resolv.conf.
#
#   2. REDIRECT CAPTIVE-PORTAL PROBE DOMAINS at our own web service on
#      192.168.4.1, where Flask answers with the magic byte sequence each
#      OS expects ("Success" HTML for Apple, 204 No Content for Android,
#      "Microsoft NCSI" for Windows, etc.).  This is what makes the AP
#      show up as a normal "internet OK" Wi-Fi network on every phone we
#      have tested instead of trapping the user in a captive-portal
#      sheet that points at our login page.
#
# REGRESSION GUARD: the `address=/<host>/192.168.4.1` lines below are
# load-bearing.  If you remove them the captive-portal probes from
# iOS/Android/Windows will hit the public internet via wlan0 (or fail),
# and the OS will mark the AP as "no internet, secured" -- some phones
# then refuse to keep traffic on the network at all.  The matching
# Flask routes that *answer* these probes live in
# web_interface/app.py; do NOT add @login_required to them.
################################################################################

# --- Upstream DNS pin -----------------------------------------------------
no-resolv
server=1.1.1.1
server=1.0.0.1
server=8.8.8.8
server=8.8.4.4

# Reasonable cache so phones that probe every 30 s don't hammer upstream.
cache-size=1000

# Faster failure when an upstream is sick -- our captive routes are local
# anyway, so the round-trip we care about is < 5 ms.
dns-forward-max=150

# --- Captive-portal probe redirects ---------------------------------------
# Apple (iOS / iPadOS / macOS)
address=/captive.apple.com/192.168.4.1
address=/www.apple.com/192.168.4.1
address=/apple.com/192.168.4.1
address=/gsp1.apple.com/192.168.4.1

# Google / Android / ChromeOS
address=/connectivitycheck.gstatic.com/192.168.4.1
address=/connectivitycheck.android.com/192.168.4.1
address=/clients3.google.com/192.168.4.1
address=/clients4.google.com/192.168.4.1
address=/www.google.com/192.168.4.1

# Microsoft (Windows 10 / 11 NCSI)
address=/www.msftconnecttest.com/192.168.4.1
address=/www.msftncsi.com/192.168.4.1
address=/dns.msftncsi.com/192.168.4.1
address=/ipv6.msftncsi.com/192.168.4.1

# GNOME / Ubuntu / generic Linux
address=/nmcheck.gnome.org/192.168.4.1
address=/network-test.debian.org/192.168.4.1

# --- Local hostnames ------------------------------------------------------
# Map the friendly hostname onto the AP IP so phones can browse to
# http://ADS-B.local/ without needing mDNS over Wi-Fi to work (some
# Android builds disable mDNS on metered networks).
address=/ADS-B.local/192.168.4.1
address=/adsb.local/192.168.4.1

# --- Hardening ------------------------------------------------------------
# Don't forward queries for *.local (that's mDNS territory).
local=/local/

# Reject malformed queries early.
domain-needed
bogus-priv

# Drop queries for non-routable / RFC1918 names from upstream.
stop-dns-rebind
