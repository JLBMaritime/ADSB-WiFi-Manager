################################################################################
# /etc/NetworkManager/conf.d/00-wifi-powersave-off.conf
#
# Permanently disable Wi-Fi power-save on every interface NetworkManager
# manages.  This is the well-known mitigation for the brcmfmac (RPi 4B
# onboard wlan0) "freeze after several hours" bug, AND for the mt76x2u
# / rt2800usb USB dongle hangs on the AP-side wlan1.  When power-save
# is enabled, the AP stops responding to probe-requests for a few
# hundred ms at a time -- which manifests as phones saying "Unable to
# join this network" or beacons disappearing from the airwaves.
#
# The numeric value 2 means "disable power-save for managed STA *and*
# AP-mode connections".  See `man NetworkManager.conf` and
# `man nm-settings` ("802-11-wireless.powersave").
#
# A oneshot fallback service (adsb-wifi-powersave-off.service) also
# runs `iw dev <iface> set power_save off` on every NM dispatcher
# event, in case the kernel re-enables power-save behind NM's back
# (which we have observed on some kernel revisions).
#
# REGRESSION GUARD: do NOT use ';' as a comment character in this
# file -- glib's keyfile parser on RPi OS Bookworm rejects ';' and
# NetworkManager fails to start, taking wlan0, wlan1 and SSH with it.
# Use '#' only.
################################################################################

[connection]
wifi.powersave=2
